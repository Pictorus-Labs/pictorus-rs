repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        description: Check if all files follow the rustfmt style
        entry: cargo fmt --all -- --check --color always
        language: system
        pass_filenames: false
      - id: clippy
        name: clippy
        description: Check if all files follow the clippy style
        # Note: This only runs on default crates in the workspace. Lint
        # on all other crates is enforced in the CI pipeline.
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
      - id: check-no-default-features
        name: check (no default features)
        description: |
          Ensure default-member crates still compile without any features.
          Catches accidental use of alloc-only APIs (e.g. `slice::sort_by`,
          `to_vec`, `format!`) in code meant for core_blocks.
        entry: cargo check --no-default-features
        language: system
        pass_filenames: false
